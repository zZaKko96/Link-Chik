<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Link-Chik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex; 
            align-items: center;
            justify-content: center;
        }

        .form-signin {
            width: 100%;
            max-width: 400px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-scissors"></i> Link-Chik
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="register.html">Реєстрація</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" id="app">
        <div class="form-signin m-auto">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle fs-1 text-primary"></i>
                        <h2 class="h3 mb-3 fw-normal">Вхід у систему</h2>
                    </div>

                    <form onsubmit="return false;">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" v-model="email" placeholder="name@example.com" required>
                            <label>Email адреса</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" v-model="password" placeholder="Password" required>
                            <label>Пароль</label>
                        </div>

                        <div class="checkbox mb-3">
                            <label>
                                <input type="checkbox" v-model="rememberMe"> Запам'ятати мене
                            </label>
                        </div>

                        <button class="w-100 btn btn-lg btn-primary" @click.prevent="loginUser">Увійти</button>

                        <hr class="my-4">
                        <p class="text-center text-muted small">Ще не маєте акаунту? <a href="register.html">Зареєструватися</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Link-Chik. Всі права захищено.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    email: '',
                    password: '',
                    rememberMe: false
                }
            },
            methods: {
                async loginUser() {
                    if (!this.email || !this.password) {
                        alert("Введіть email та пароль!");
                        return;
                    }

                    try {
                        // Відправляємо запит на сервер
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                email: this.email, 
                                password: this.password 
                            })
                        });

                        const result = await response.json();

                        if (result.success) {
                            // Зберігаємо сесію, щоб інші сторінки знали, хто залогінився
                            const storage = this.rememberMe ? localStorage : sessionStorage;
                            storage.setItem('activeUser', JSON.stringify(result.user));
                            window.location.href = 'index.html';
                        } else {
                            alert(result.message);
                        }
                    } catch (error) {
                        console.error("Помилка:", error);
                        alert("Не вдалося з'єднатися з сервером. Перевір, чи працює node server.js");
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
