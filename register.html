<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Link-Chik</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .form-register {
            width: 100%;
            max-width: 500px; 
            padding: 15px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-scissors"></i> Link-Chik
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                </ul>
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Вхід</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container" id="app">
        <div class="form-register m-auto">
            <div class="card shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                        <h2 class="h3 mb-3 fw-normal">Створити акаунт</h2>
                    </div>

                    <form onsubmit="return false;">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" v-model="name" placeholder="Іван Іванов" required>
                            <label>Ваше ім'я</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" v-model="email" placeholder="name@example.com" required>
                            <label>Email адреса</label>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-md">
                                <div class="form-floating">
                                    <select class="form-select" v-model="gender" aria-label="Стать">
                                        <option value="Оберіть..." disabled>Оберіть...</option>
                                        <option value="Чоловіча">Чоловіча</option>
                                        <option value="Жіноча">Жіноча</option>
                                        <option value="Не вказувати">Не вказувати</option>
                                    </select>
                                    <label>Стать</label>
                                </div>
                            </div>
                            <div class="col-md">
                                <div class="form-floating">
                                    <input type="date" class="form-control" v-model="rawDate" required>
                                    <label>Дата народження</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" v-model="password" placeholder="Password" required>
                            <label>Пароль</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" v-model="confirmPassword" placeholder="Password" required>
                            <label>Повторіть пароль</label>
                        </div>

                        <div class="checkbox mb-3">
                            <label>
                                <input type="checkbox" v-model="termsAccepted" required> Я погоджуюсь з умовами
                            </label>
                        </div>

                        <button class="w-100 btn btn-lg btn-primary" @click.prevent="registerUser">Зареєструватися</button>

                        <hr class="my-4">
                        <p class="text-center text-muted small">Вже є акаунт? <a href="login.html">Увійти</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-1">&copy; 2026 Link-Chik. Всі права захищено.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    name: '',
                    email: '',
                    gender: 'Оберіть...',
                    rawDate: '',
                    password: '',
                    confirmPassword: '',
                    termsAccepted: false
                }
            },
            methods: {
                async registerUser() {
                    // Валідація полів
                    if (!this.name || !this.email || !this.password || !this.confirmPassword || 
                        this.gender === "Оберіть..." || !this.rawDate || !this.termsAccepted) {
                        alert("Помилка! Заповніть усі поля, оберіть стать, дату і поставте галочку!");
                        return;
                    }

                    // Перевірка збігу паролів
                    if (this.password !== this.confirmPassword) {
                        alert("Помилка! Паролі не збігаються. Спробуйте ще раз.");
                        this.confirmPassword = ''; // Очищаємо поле повтору пароля
                        return;
                    }

                    // Форматуємо дату з РРРР-ММ-ДД у ДД.ММ.РРРР
                    const parts = this.rawDate.split('-');
                    const formattedDate = `${parts[2]}.${parts[1]}.${parts[0]}`;

                    try {
                        // Відправляємо дані на наш бекенд
                        const response = await fetch('/api/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: this.name,
                                email: this.email,
                                password: this.password,
                                gender: this.gender,
                                date: formattedDate
                            })
                        });

                        const result = await response.json();

                        if (result.success) {
                            alert("Реєстрація успішна! Увійдіть у систему.");
                            window.location.href = 'login.html'; // Перекидаємо на сторінку входу
                        } else {
                            // Наприклад, якщо такий email вже існує
                            alert(result.message);
                        }
                    } catch (error) {
                        console.error("Помилка:", error);
                        alert("Не вдалося з'єднатися з сервером.");
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
